name: TokenMukbang
options:
  bundleIdPrefix: com.tokenmukbang
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  TokenMukbangKit:
    # The shared core lives in the SPM package at the repo root.
    path: ..
  # (MenuBarExtraAccess removed — the app no longer uses MenuBarExtra; it creates the
  #  NSStatusItem + glass NSPanel directly, ADR-0018.)

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Local/dev build: no team, ad-hoc signing. Headless verification passes
    # CODE_SIGNING_ALLOWED=NO so entitlements aren't validated against a profile.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""

targets:
  TokenMukbang:
    type: application
    platform: macOS
    sources:
      - path: TokenMukbang
      - path: Shared
    dependencies:
      - package: TokenMukbangKit
        product: TokenMukbangKit
      - target: TokenMukbangWidget
        embed: true
    info:
      path: TokenMukbang/Info.plist
      properties:
        CFBundleDisplayName: TokenMukbang
        # Menu-bar accessory app: no Dock icon, no main window.
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
    entitlements:
      path: TokenMukbang/App.entitlements
      properties:
        # NOT sandboxed: shells out to security/ps/lsof/osascript. Shares the
        # cached snapshot with the widget via this App Group.
        com.apple.security.application-groups:
          - group.com.tokenmukbang
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenmukbang.app
        PRODUCT_NAME: TokenMukbang
        ENABLE_HARDENED_RUNTIME: "YES"

  TokenMukbangWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: TokenMukbangWidget
      - path: Shared
    dependencies:
      - package: TokenMukbangKit
        product: TokenMukbangKit
    info:
      path: TokenMukbangWidget/Info.plist
      properties:
        CFBundleDisplayName: TokenMukbang
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TokenMukbangWidget/Widget.entitlements
      properties:
        # Widget runs sandboxed; the App Group lets it read the app's snapshot.
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.tokenmukbang
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenmukbang.app.widget
        PRODUCT_NAME: TokenMukbangWidget
        ENABLE_HARDENED_RUNTIME: "YES"

schemes:
  TokenMukbang:
    build:
      targets:
        TokenMukbang: all
        TokenMukbangWidget: all
    run:
      config: Debug
