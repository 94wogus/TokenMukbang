<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>06. 유리 찬합 (Tiered Glass)</title>
</head>
<body style="margin:0; padding:0; width:800px; height:560px; overflow:hidden; font-family:-apple-system,'SF Pro Text','SF Pro Display',Helvetica,Arial,sans-serif; background:radial-gradient(140% 120% at 18% 8%, #181c24 0%, #0e1014 48%, #07080b 100%);">

  <!-- ============ DESKTOP CANVAS 800x560 ============ -->
  <div style="position:relative; width:800px; height:560px;">

    <!-- faint wallpaper texture streaks -->
    <div style="position:absolute; inset:0; background:linear-gradient(115deg, transparent 40%, rgba(120,140,180,0.05) 50%, transparent 60%); pointer-events:none;"></div>

    <!-- ============ MENU BAR (~26px) ============ -->
    <div style="position:absolute; top:0; left:0; width:800px; height:26px; background:rgba(18,20,26,0.82); border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; box-sizing:border-box; padding:0 12px; backdrop-filter:blur(12px);">
      <span style="color:#c7ccd6; font-size:12px; font-weight:600; letter-spacing:.2px;">&#63743;</span>
      <span style="color:#8a909c; font-size:12px; margin-left:14px;">File&nbsp;&nbsp;Edit&nbsp;&nbsp;View</span>

      <!-- right cluster: the TokenMukbang menu-bar item -->
      <div style="margin-left:auto; display:flex; align-items:center; gap:16px;">
        <span style="color:#7f8590; font-size:12px;">&#128268;</span>
        <span style="color:#7f8590; font-size:12px;">&#128246;</span>

        <!-- menu-bar widget: scrim capsule + 2-line tiered meniscus -->
        <div style="position:relative; display:inline-flex; flex-direction:column; align-items:stretch;">
          <div style="display:flex; align-items:center; gap:7px; background:#14161a; border:1px solid rgba(255,255,255,0.08); border-radius:7px; padding:2px 8px;">
            <span style="display:inline-block; width:9px; height:9px; border-radius:2px; background:linear-gradient(180deg,#f06a4c,#d8472e); box-shadow:0 0 6px rgba(232,74,44,0.7);"></span>
            <span style="color:#f3f4f6; font-size:12px; font-weight:600; font-variant-numeric:tabular-nums; letter-spacing:.2px;">85%</span>
            <span style="color:#6b717c; font-size:11px;">&middot;</span>
            <span style="color:#cfd3da; font-size:11px; font-variant-numeric:tabular-nums;">3&nbsp;&#9680;</span>
          </div>
          <!-- front-tier meniscus (5h critical) -->
          <div style="height:2px; margin-top:1px; border-radius:2px; background:linear-gradient(90deg, rgba(232,74,44,0) 0%, #e84a2c 50%, rgba(232,74,44,0) 100%); box-shadow:0 0 5px rgba(232,74,44,0.6);"></div>
          <!-- back-tier meniscus (7d watch, dimmer) -->
          <div style="height:1px; margin-top:1px; border-radius:2px; background:linear-gradient(90deg, rgba(242,162,38,0) 0%, rgba(242,162,38,0.55) 50%, rgba(242,162,38,0) 100%);"></div>
        </div>

        <span style="color:#cfd3da; font-size:12px; font-variant-numeric:tabular-nums; margin-left:4px;">100%&#128267;</span>
        <span style="color:#cfd3da; font-size:12px; font-variant-numeric:tabular-nums;">Fri 14:21</span>
      </div>
    </div>

    <!-- connector notch from menu bar to popover -->
    <div style="position:absolute; top:26px; right:212px; width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-bottom:8px solid rgba(40,44,52,0.96); z-index:30;"></div>

    <!-- ============ POPOVER (~340px) ============ -->
    <div style="position:absolute; top:34px; right:24px; width:340px; box-sizing:border-box; padding:14px; border-radius:22px; background:linear-gradient(180deg, rgba(30,34,42,0.96) 0%, rgba(20,23,29,0.97) 100%); border:1px solid rgba(255,255,255,0.10); box-shadow:0 24px 60px rgba(0,0,0,0.62), 0 2px 0 rgba(255,255,255,0.05) inset; z-index:20;">

      <!-- ====== TIER STACK ====== -->
      <!-- z3 FRONT TIER : 5-HOUR, critical, thick glass, raised -->
      <div style="position:relative; border-radius:18px; padding:13px 14px 14px; margin-bottom:-6px; background:linear-gradient(180deg, rgba(54,60,70,0.96) 0%, rgba(44,49,58,0.96) 100%); border:2px solid rgba(255,255,255,0.16); box-shadow:0 12px 26px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.22) inset; z-index:4; overflow:hidden;">
        <!-- per-tier broth glow (critical red), clipped inside -->
        <div style="position:absolute; left:-10%; bottom:-60%; width:120%; height:130%; background:radial-gradient(60% 70% at 50% 100%, rgba(232,74,44,0.55) 0%, rgba(232,74,44,0.18) 42%, rgba(232,74,44,0) 70%); pointer-events:none;"></div>
        <!-- warmed rim hint (critical) -->
        <div style="position:absolute; inset:0; border-radius:18px; box-shadow:0 0 0 1px rgba(232,74,44,0.28) inset; pointer-events:none;"></div>

        <div style="position:relative; display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;">
          <span style="color:#cdd2db; font-size:11px; font-weight:600; letter-spacing:1.4px;">5-HOUR</span>
          <span style="color:#9aa0ab; font-size:11px; font-variant-numeric:tabular-nums;">resets&nbsp;0h&nbsp;42m</span>
        </div>
        <div style="position:relative; display:flex; align-items:flex-end; gap:10px;">
          <!-- gauge -->
          <div style="flex:1; height:11px; border-radius:6px; background:rgba(10,11,14,0.7); overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,0.4) inset;">
            <div style="width:85%; height:100%; border-radius:6px; background:linear-gradient(90deg,#f06a4c,#e84a2c); box-shadow:0 0 10px rgba(232,74,44,0.55);"></div>
          </div>
          <!-- hero % on scrim -->
          <div style="background:#14161a; border-radius:7px; padding:2px 8px;">
            <span style="color:#f3f4f6; font-size:26px; font-weight:600; font-variant-numeric:tabular-nums; line-height:1; letter-spacing:-.5px;">85%</span>
          </div>
        </div>
      </div>

      <!-- z2 MID TIER : 7-DAY, watch, medium glass, slightly back/down -->
      <div style="position:relative; border-radius:17px; padding:11px 13px 12px; margin:0 6px -6px; background:linear-gradient(180deg, rgba(40,45,53,0.95) 0%, rgba(32,36,43,0.95) 100%); border:1.5px solid rgba(255,255,255,0.11); box-shadow:0 8px 18px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.12) inset; z-index:3; overflow:hidden;">
        <!-- per-tier broth glow (watch honey) -->
        <div style="position:absolute; left:-10%; bottom:-55%; width:120%; height:120%; background:radial-gradient(60% 65% at 50% 100%, rgba(242,162,38,0.34) 0%, rgba(242,162,38,0.1) 45%, rgba(242,162,38,0) 72%); pointer-events:none;"></div>

        <div style="position:relative; display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px;">
          <span style="color:#bcc2cc; font-size:10.5px; font-weight:600; letter-spacing:1.3px;">7-DAY</span>
          <span style="color:#8f96a1; font-size:10.5px; font-variant-numeric:tabular-nums;">resets&nbsp;3d&nbsp;5h</span>
        </div>
        <div style="position:relative; display:flex; align-items:center; gap:9px;">
          <div style="flex:1; height:9px; border-radius:5px; background:rgba(10,11,14,0.65); overflow:hidden;">
            <div style="width:47%; height:100%; border-radius:5px; background:linear-gradient(90deg,#f2b24a,#e89b2e); box-shadow:0 0 8px rgba(242,162,38,0.45);"></div>
          </div>
          <div style="background:#14161a; border-radius:6px; padding:1px 7px;">
            <span style="color:#eef0f3; font-size:18px; font-weight:600; font-variant-numeric:tabular-nums; line-height:1;">47%</span>
          </div>
        </div>
      </div>

      <!-- z1 BACK TIER + SEDIMENT GLASS in a row -->
      <div style="display:flex; align-items:stretch; gap:8px; margin:0 12px 0;">
        <!-- back tier : SONNET 7D, calm, thin glass, deepest -->
        <div style="position:relative; flex:1; border-radius:16px; padding:10px 12px 11px; background:linear-gradient(180deg, rgba(28,31,37,0.94) 0%, rgba(22,25,31,0.94) 100%); border:1px solid rgba(255,255,255,0.07); box-shadow:0 4px 11px rgba(0,0,0,0.45); z-index:2; overflow:hidden;">
          <!-- calm glow : barely there -->
          <div style="position:absolute; left:0; bottom:-50%; width:100%; height:100%; background:radial-gradient(55% 60% at 50% 100%, rgba(240,169,60,0.18) 0%, rgba(240,169,60,0) 65%); pointer-events:none;"></div>
          <div style="position:relative; display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;">
            <span style="color:#aab0bb; font-size:10px; font-weight:600; letter-spacing:1.2px;">SONNET&nbsp;7D</span>
            <span style="color:#7f868f; font-size:10px; font-variant-numeric:tabular-nums;">3d&nbsp;5h</span>
          </div>
          <div style="position:relative; display:flex; align-items:center; gap:8px;">
            <div style="flex:1; height:7px; border-radius:4px; background:rgba(10,11,14,0.6); overflow:hidden;">
              <div style="width:11%; height:100%; border-radius:4px; background:linear-gradient(90deg,#f0c074,#e8a33d);"></div>
            </div>
            <div style="background:#14161a; border-radius:5px; padding:1px 6px;">
              <span style="color:#e4e7ec; font-size:14px; font-weight:600; font-variant-numeric:tabular-nums; line-height:1;">11%</span>
            </div>
          </div>
          <div style="position:relative; margin-top:5px; color:#6f7680; font-size:9px; letter-spacing:.4px;">&middot;calm&middot;</div>
        </div>

        <!-- sediment glass column : model token history -->
        <div style="position:relative; width:48px; border-radius:13px; background:linear-gradient(180deg, rgba(44,49,58,0.55), rgba(30,34,42,0.55)); border:1px solid rgba(255,255,255,0.10); box-shadow:0 4px 11px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.14) inset; overflow:hidden; display:flex; flex-direction:column;">
          <!-- top label -->
          <div style="text-align:center; color:#7f868f; font-size:8px; padding-top:4px; letter-spacing:.5px;">HIST</div>
          <!-- sediment layers : top=recent, bottom=past -->
          <div style="flex:1; display:flex; flex-direction:column; justify-content:flex-end; padding:3px;">
            <!-- opus recent (warm/strong) -->
            <div style="height:14px; border-radius:3px 3px 0 0; background:linear-gradient(180deg,#e8743a,#d8472e); opacity:0.92;"></div>
            <div style="height:10px; background:linear-gradient(180deg,#e89b2e,#d98a26); opacity:0.88;"></div>
            <!-- sonnet -->
            <div style="height:12px; background:linear-gradient(180deg,#e8a33d,#caa24a); opacity:0.78;"></div>
            <div style="height:9px; background:linear-gradient(180deg,#bca25a,#8f8a6a); opacity:0.6;"></div>
            <!-- past settles cooler/darker -->
            <div style="height:11px; background:linear-gradient(180deg,#6b6e74,#494d54); opacity:0.5;"></div>
            <div style="height:14px; border-radius:0 0 3px 3px; background:linear-gradient(180deg,#43474e,#2c313a); opacity:0.55;"></div>
          </div>
          <!-- glass surface specular -->
          <div style="position:absolute; top:0; left:0; width:100%; height:40%; background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0)); pointer-events:none;"></div>
        </div>
      </div>

      <!-- ====== SESSIONS (flattest slabs) ====== -->
      <div style="margin-top:14px; padding-top:2px;">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
          <span style="color:#7f868f; font-size:9.5px; font-weight:600; letter-spacing:1.5px;">SESSIONS</span>
          <div style="flex:1; height:1px; background:rgba(255,255,255,0.08);"></div>
        </div>

        <!-- session row 1 : ctx 80% -->
        <div style="display:flex; align-items:center; gap:9px; padding:6px 9px; border-radius:10px; background:rgba(255,255,255,0.035); margin-bottom:5px;">
          <span style="color:#e89b2e; font-size:12px;">&#9680;</span>
          <span style="color:#dfe2e7; font-size:11.5px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">arkraft-api</span>
          <div style="width:54px; height:5px; border-radius:3px; background:rgba(10,11,14,0.6); overflow:hidden;">
            <div style="width:80%; height:100%; background:linear-gradient(90deg,#f2b24a,#e89b2e);"></div>
          </div>
          <span style="color:#cfd3da; font-size:11px; font-variant-numeric:tabular-nums; width:30px; text-align:right;">80%</span>
          <span style="color:#6f7680; font-size:10px;">&#8599;</span>
        </div>

        <!-- session row 2 : ctx 69% -->
        <div style="display:flex; align-items:center; gap:9px; padding:6px 9px; border-radius:10px; background:rgba(255,255,255,0.035); margin-bottom:5px;">
          <span style="color:#e8a33d; font-size:12px;">&#9681;</span>
          <span style="color:#dfe2e7; font-size:11.5px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">usage-widget</span>
          <div style="width:54px; height:5px; border-radius:3px; background:rgba(10,11,14,0.6); overflow:hidden;">
            <div style="width:69%; height:100%; background:linear-gradient(90deg,#f0c074,#e8a33d);"></div>
          </div>
          <span style="color:#cfd3da; font-size:11px; font-variant-numeric:tabular-nums; width:30px; text-align:right;">69%</span>
          <span style="color:#6f7680; font-size:10px;">&#8599;</span>
        </div>

        <!-- session row 3 : ctx 21% -->
        <div style="display:flex; align-items:center; gap:9px; padding:6px 9px; border-radius:10px; background:rgba(255,255,255,0.035);">
          <span style="color:#9aa0ab; font-size:12px;">&#9684;</span>
          <span style="color:#dfe2e7; font-size:11.5px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">docs-site</span>
          <div style="width:54px; height:5px; border-radius:3px; background:rgba(10,11,14,0.6); overflow:hidden;">
            <div style="width:21%; height:100%; background:linear-gradient(90deg,#c0c5cd,#9aa0ab);"></div>
          </div>
          <span style="color:#cfd3da; font-size:11px; font-variant-numeric:tabular-nums; width:30px; text-align:right;">21%</span>
          <span style="color:#6f7680; font-size:10px;">&#8599;</span>
        </div>
      </div>

    </div>
    <!-- ============ /POPOVER ============ -->

    <!-- caption chip bottom-left -->
    <div style="position:absolute; left:20px; bottom:16px; color:#5a616c; font-size:11px; letter-spacing:.3px;">
      <span style="color:#9aa0ab; font-weight:600;">TokenMukbang</span> &nbsp;&middot;&nbsp; 06. 유리 찬합 (Tiered Glass) &nbsp;&middot;&nbsp; z축 층 = 정보 위계
    </div>

  </div>
</body>
</html>
