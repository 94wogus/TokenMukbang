<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>08. 냠이 (Nyam-i) — Dark Indigo-Plum</title>
<style>
  :root{
    /* canvas / stage mesh (multicolor, dark indigo-plum) */
    --canvas:#1A1730;
    --meshA:#3A2A4D;   /* plum */
    --meshB:#1F2E4A;   /* midnight */
    --meshC:#2A2358;   /* aurora base */
    --seam:#2C2748;
    /* data column — near-neutral */
    --surface:#221E3A;
    --ink:#EDE9FB;
    --muted:#9A92B8;
    /* single data accent = current top risk = critical (clean red) */
    --accent:#FB3A63;
    /* per-row accents are still the SAME mono system; only word color carries level
       but gauges use ONE accent token — we keep gauge stroke neutral except active.
       For clarity each dial uses its own level accent on the ring only (still single-hued per dial). */
    --calm:#34D399;
    --watch:#F2A94E;
    --critical:#FB3A63;
    --track:#332C52;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,'SF Pro Rounded',sans-serif;
    background:
      radial-gradient(1100px 700px at 18% -10%, #241d3f 0%, rgba(36,29,63,0) 60%),
      radial-gradient(900px 600px at 110% 120%, #1d2a45 0%, rgba(29,42,69,0) 55%),
      #100d22;
    display:flex;align-items:center;justify-content:center;
    width:100vw;height:100vh;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .tabnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;}

  /* ===== fixed desktop frame ===== */
  .desk{
    position:relative;width:800px;height:560px;border-radius:22px;
    overflow:hidden;
    background:
      radial-gradient(700px 420px at 78% 8%, #2b2350 0%, rgba(43,35,80,0) 60%),
      radial-gradient(620px 520px at 8% 100%, #182740 0%, rgba(24,39,64,0) 55%),
      linear-gradient(160deg,#1b1636 0%,#15122b 100%);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.04);
  }
  /* faint desktop wallpaper texture dots */
  .desk::after{
    content:"";position:absolute;inset:0;opacity:.35;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:26px 26px;
  }

  /* ===== menu bar strip ===== */
  .menubar{
    position:absolute;top:0;left:0;right:0;height:26px;z-index:5;
    background:rgba(20,16,38,0.72);
    backdrop-filter:saturate(140%) blur(12px);
    -webkit-backdrop-filter:saturate(140%) blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.06);
    display:flex;align-items:center;justify-content:flex-end;
    gap:14px;padding:0 14px;
    font-size:12px;color:#cfc9e6;letter-spacing:.2px;
  }
  .menubar .pair{display:flex;align-items:center;gap:5px;}
  .menubar .lbl{color:#8e87ab;font-weight:500;}
  .menubar .val{font-weight:600;color:#eee8ff;}
  .menubar .val.crit{color:var(--critical);}
  /* stuffed face glyph ◉ — micro 7px */
  .face{
    display:inline-block;width:13px;height:13px;border-radius:50%;
    margin-left:4px;position:relative;
    background:radial-gradient(circle at 38% 32%, #ff7aa0 0%, #fb3a63 55%, #c81c45 100%);
    box-shadow:0 0 6px rgba(251,58,99,.7), inset 0 -2px 3px rgba(120,10,40,.6);
  }
  .face::before,.face::after{
    content:"";position:absolute;top:4.5px;width:1.6px;height:1.6px;border-radius:50%;
    background:#2a0c18;
  }
  .face::before{left:3.4px;}
  .face::after{right:3.4px;}

  /* ===== popover ===== */
  .popover{
    position:absolute;top:34px;right:14px;z-index:4;
    width:360px;height:340px;border-radius:18px;overflow:hidden;
    display:flex;
    box-shadow:0 24px 60px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.05) inset;
    border:1px solid rgba(255,255,255,.07);
  }
  /* little pointer notch toward menubar */
  .popover::before{
    content:"";position:absolute;top:-7px;right:42px;width:14px;height:14px;
    background:#241c3e;transform:rotate(45deg);
    border-left:1px solid rgba(255,255,255,.07);
    border-top:1px solid rgba(255,255,255,.07);
    z-index:6;
  }

  /* ---- LEFT 35% : 냠이 stage (mesh gradient, multicolor) ---- */
  .stage{
    position:relative;width:35%;
    background:
      radial-gradient(120px 120px at 30% 22%, var(--meshA) 0%, rgba(58,42,77,0) 70%),
      radial-gradient(150px 140px at 80% 30%, var(--meshC) 0%, rgba(42,35,88,0) 72%),
      radial-gradient(160px 150px at 20% 95%, var(--meshB) 0%, rgba(31,46,74,0) 70%),
      radial-gradient(180px 180px at 95% 100%, var(--meshA) 0%, rgba(58,42,77,0) 75%),
      linear-gradient(165deg,#241a3c 0%,#1c1733 100%);
    display:flex;flex-direction:column;align-items:center;
    padding:16px 10px 12px;
    overflow:hidden;
  }
  /* faint aurora band */
  .stage::before{
    content:"";position:absolute;left:-20%;right:-20%;top:30%;height:70px;
    background:linear-gradient(90deg,rgba(120,90,200,0),rgba(150,110,255,.18),rgba(90,160,200,.1),rgba(120,90,200,0));
    filter:blur(14px);transform:rotate(-12deg);pointer-events:none;
  }
  .stage-title{
    align-self:flex-start;font-size:10px;font-weight:600;letter-spacing:.6px;
    text-transform:uppercase;color:#b6a9e0;opacity:.8;margin-bottom:2px;
  }

  /* ===== 냠이 blob — critical, stuffed, hot-pink/red, cheeks full ===== */
  .blob-wrap{
    position:relative;margin:14px 0 6px;width:120px;height:118px;
    display:flex;align-items:center;justify-content:center;
    animation:breathe 3.2s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-2px) scale(1.015);}
  }
  /* outer glow (self-luminous in dark) */
  .blob-glow{
    position:absolute;width:128px;height:118px;border-radius:50%;
    background:radial-gradient(circle at 50% 55%, rgba(251,58,99,.55) 0%, rgba(255,90,140,.22) 45%, rgba(251,58,99,0) 72%);
    filter:blur(6px);
  }
  /* the clay body — stuffed: wider than tall, big rounded, bulging cheeks via radii */
  .blob{
    position:relative;width:118px;height:104px;
    border-radius:54% 54% 50% 50% / 60% 60% 48% 48%;
    background:
      radial-gradient(60% 55% at 40% 30%, #ff96b6 0%, #fb5a85 42%, #ef3a6a 70%, #cf1f4c 100%);
    box-shadow:
      0 14px 26px rgba(180,20,60,.45),
      inset 6px 8px 14px rgba(255,200,215,.55),
      inset -8px -10px 18px rgba(150,12,52,.75);
  }
  /* glossy highlight */
  .blob::before{
    content:"";position:absolute;top:11px;left:20px;width:34px;height:22px;
    border-radius:50%;
    background:radial-gradient(circle at 40% 40%, rgba(255,255,255,.85), rgba(255,255,255,0) 70%);
    filter:blur(.4px);
  }
  /* bulging stuffed cheeks (two extra puffs) */
  .cheek{
    position:absolute;top:46px;width:30px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 45% 35%, #ff8fae 0%, #fb5680 55%, #db2a58 100%);
    box-shadow:inset -3px -4px 7px rgba(150,12,52,.6), 0 3px 6px rgba(180,20,60,.35);
  }
  .cheek.l{left:4px;}
  .cheek.r{right:4px;}
  /* face features — minimal: squeezed-shut happy eyes + tiny stuffed mouth */
  .eye{
    position:absolute;top:42px;width:13px;height:7px;
    border:2.4px solid #45102a;border-bottom:none;
    border-radius:13px 13px 0 0;
  }
  .eye.l{left:33px;}
  .eye.r{right:33px;}
  .mouth{
    position:absolute;top:60px;left:50%;transform:translateX(-50%);
    width:14px;height:9px;border-radius:0 0 14px 14px;
    background:#5a142f;
    box-shadow:inset 0 -2px 2px rgba(0,0,0,.3);
  }
  /* blush dots */
  .blush{
    position:absolute;top:54px;width:11px;height:6px;border-radius:50%;
    background:rgba(255,120,150,.55);filter:blur(1px);
  }
  .blush.l{left:20px;}
  .blush.r{right:20px;}

  .pose-cap{
    font-size:11px;color:#f0c3d2;font-weight:600;letter-spacing:.2px;
    margin-top:2px;text-shadow:0 0 8px rgba(251,58,99,.45);
  }

  /* leftovers plate (model token history) — multicolor allowed */
  .plate-block{margin-top:auto;width:100%;}
  .plate-lbl{font-size:9px;color:#b0a4d6;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px;opacity:.85;}
  .plate{
    position:relative;height:24px;border-radius:13px;
    background:rgba(10,8,22,.45);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.05), inset 0 2px 5px rgba(0,0,0,.4);
    display:flex;align-items:center;padding:0 5px;gap:0;overflow:hidden;
  }
  .plate .stack{display:flex;height:11px;width:100%;border-radius:7px;overflow:hidden;}
  .stack .seg{height:100%;}
  .seg.opus{background:linear-gradient(90deg,#a06bff,#7c4dff);}
  .seg.sonnet{background:linear-gradient(90deg,#4ec0e8,#2f9bd6);}
  .seg.rest{background:rgba(255,255,255,.06);}
  .plate-legend{display:flex;gap:10px;margin-top:5px;font-size:9px;color:#a99fcf;}
  .plate-legend .k{display:inline-flex;align-items:center;gap:4px;}
  .dot{width:7px;height:7px;border-radius:2px;}
  .dot.opus{background:#7c4dff;}
  .dot.sonnet{background:#2f9bd6;}

  /* seam between stage and data */
  .seam{
    width:1px;flex:0 0 1px;
    background:linear-gradient(180deg,rgba(255,255,255,.02),var(--seam),rgba(255,255,255,.02));
    box-shadow:1px 0 0 rgba(0,0,0,.3);
  }

  /* ---- RIGHT 65% : pure data column (near-neutral + 1 accent) ---- */
  .data{
    position:relative;width:65%;
    background:linear-gradient(180deg,#211c39 0%,#1d193230 100%),var(--surface);
    padding:14px 16px 12px;display:flex;flex-direction:column;gap:11px;
    overflow:hidden;
  }
  .row{display:flex;align-items:center;gap:13px;}
  .row .meta{display:flex;flex-direction:column;gap:1px;}
  .row .win{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;}
  .row .big{
    font-size:27px;font-weight:700;line-height:1;color:var(--ink);
    letter-spacing:-.5px;
  }
  .row .state{font-size:11px;font-weight:600;margin-top:2px;}
  .row .reset{font-size:10px;color:var(--muted);margin-top:1px;}
  .state.calm{color:var(--calm);}
  .state.watch{color:var(--watch);}
  .state.critical{color:var(--critical);}

  /* thin-wall clay ring/dial */
  .dial{position:relative;width:54px;height:54px;flex:0 0 54px;}
  .dial svg{transform:rotate(-90deg);display:block;}
  .dial .pct{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:var(--ink);
  }
  .ring-track{stroke:var(--track);}
  .divider{height:1px;background:rgba(255,255,255,.05);margin:1px 0;}

  /* sessions */
  .sess-title{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin-bottom:1px;}
  .sess{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--ink);padding:1px 0;}
  .sess .name{flex:0 0 76px;color:#d8d2ef;}
  .sess .bar{flex:1;height:6px;border-radius:4px;background:var(--track);overflow:hidden;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.4);}
  .sess .fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#6f64a8,#8a7fd0);}
  .sess .ctx{flex:0 0 38px;text-align:right;color:var(--muted);font-size:10px;}

  .foot-note{
    position:absolute;bottom:6px;left:16px;right:16px;
    font-size:8.5px;color:#6b6390;letter-spacing:.2px;display:flex;justify-content:space-between;
  }
</style>
</head>
<body>
  <div class="desk">

    <!-- ===== menu bar ===== -->
    <div class="menubar">
      <div class="pair tabnum"><span class="lbl">5h</span><span class="val crit">85%</span></div>
      <div class="pair tabnum"><span class="lbl">7d</span><span class="val">47%</span></div>
      <span class="face" title="stuffed / critical"></span>
    </div>

    <!-- ===== popover ===== -->
    <div class="popover">

      <!-- LEFT 35% : 냠이 stage -->
      <div class="stage">
        <div class="stage-title">냠이</div>

        <div class="blob-wrap">
          <div class="blob-glow"></div>
          <div class="blob">
            <div class="cheek l"></div>
            <div class="cheek r"></div>
            <div class="blush l"></div>
            <div class="blush r"></div>
            <div class="eye l"></div>
            <div class="eye r"></div>
            <div class="mouth"></div>
          </div>
        </div>
        <div class="pose-cap">stuffed · food coma</div>

        <div class="plate-block">
          <div class="plate-lbl">leftovers plate</div>
          <div class="plate">
            <div class="stack">
              <div class="seg opus"    style="width:34%"></div>
              <div class="seg sonnet"  style="width:41%"></div>
              <div class="seg rest"    style="width:25%"></div>
            </div>
          </div>
          <div class="plate-legend">
            <span class="k"><span class="dot opus"></span>opus</span>
            <span class="k"><span class="dot sonnet"></span>sonnet</span>
          </div>
        </div>
      </div>

      <!-- seam -->
      <div class="seam"></div>

      <!-- RIGHT 65% : data column -->
      <div class="data">

        <!-- 5h — critical 85% -->
        <div class="row">
          <div class="dial">
            <svg width="54" height="54" viewBox="0 0 54 54">
              <circle class="ring-track" cx="27" cy="27" r="22" fill="none" stroke-width="5"/>
              <circle cx="27" cy="27" r="22" fill="none" stroke="var(--critical)" stroke-width="5"
                stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="20.7"/>
            </svg>
            <div class="pct tabnum">85%</div>
          </div>
          <div class="meta">
            <span class="win">5h window</span>
            <span class="big tabnum">85%</span>
            <span class="state critical">critical</span>
            <span class="reset tabnum">resets in 0h 41m</span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 7d — watch 47% -->
        <div class="row">
          <div class="dial">
            <svg width="54" height="54" viewBox="0 0 54 54">
              <circle class="ring-track" cx="27" cy="27" r="22" fill="none" stroke-width="5"/>
              <circle cx="27" cy="27" r="22" fill="none" stroke="var(--watch)" stroke-width="5"
                stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="73.2"/>
            </svg>
            <div class="pct tabnum">47%</div>
          </div>
          <div class="meta">
            <span class="win">7d window</span>
            <span class="big tabnum">47%</span>
            <span class="state watch">watch</span>
            <span class="reset tabnum">resets in 3d 4h</span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 7d sonnet — calm 11% (compact) -->
        <div class="row">
          <div class="dial" style="width:40px;height:40px;flex:0 0 40px;">
            <svg width="40" height="40" viewBox="0 0 40 40">
              <circle class="ring-track" cx="20" cy="20" r="16" fill="none" stroke-width="4"/>
              <circle cx="20" cy="20" r="16" fill="none" stroke="var(--calm)" stroke-width="4"
                stroke-linecap="round" stroke-dasharray="100.5" stroke-dashoffset="89.4"/>
            </svg>
            <div class="pct tabnum" style="font-size:10px;">11%</div>
          </div>
          <div class="meta">
            <span class="win">7d sonnet</span>
            <span class="state calm">calm · 11%</span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- sessions -->
        <div>
          <div class="sess-title">sessions · 3</div>
          <div class="sess">
            <span class="name">arkraft-api</span>
            <span class="bar"><span class="fill" style="width:42%"></span></span>
            <span class="ctx tabnum">42%</span>
          </div>
          <div class="sess">
            <span class="name">usage-widget</span>
            <span class="bar"><span class="fill" style="width:71%"></span></span>
            <span class="ctx tabnum">71%</span>
          </div>
          <div class="sess">
            <span class="name">arkraft-web</span>
            <span class="bar"><span class="fill" style="width:18%"></span></span>
            <span class="ctx tabnum">18%</span>
          </div>
        </div>

        <div class="foot-note">
          <span>data = near-neutral + 1 accent</span>
          <span>mascot ⟂ seam</span>
        </div>
      </div>

    </div><!-- /popover -->
  </div><!-- /desk -->
</body>
</html>
